<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no, initial-scale=1.0, viewport-fit=cover">
<title>Iconic Covers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f5f0e8;
  --ink: #1a1a1a;
  --red: #c8102e;
  --mid: #888;
  --border: #d0c8b8;
  --card-bg: #faf7f2;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
html, body { width: 100%; height: 100%; background: var(--ink); overflow: hidden; }

#app {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column;
  padding-top: var(--safe-top);
  background: var(--cream);
  font-family: 'EB Garamond', Georgia, serif;
  color: var(--ink);
}

.header {
  background: var(--cream);
  border-bottom: 2.5px solid var(--ink);
  padding: 8px 14px 7px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; position: relative;
}
.header::after {
  content: ''; position: absolute; bottom: -5px; left: 0; right: 0;
  height: 2px; background: var(--ink);
}
.header-center { flex: 1; text-align: center; }
.masthead { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; letter-spacing: -0.5px; line-height: 1; }
.header-sub { font-size: 9.5px; letter-spacing: 3px; text-transform: uppercase; color: var(--mid); margin-top: 1px; }
.lang-btn {
  background: var(--ink); color: var(--cream); border: none; border-radius: 5px;
  padding: 5px 10px; cursor: pointer; display: flex; align-items: center; gap: 5px;
  font-family: 'EB Garamond', serif; font-size: 13px; letter-spacing: 0.5px; flex-shrink: 0;
}
.lang-btn:active { opacity: 0.7; }
.flag { font-size: 17px; }
.header-spacer { width: 62px; flex-shrink: 0; }

.content { flex: 1; overflow: hidden; position: relative; }
.tab-panel { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; padding-bottom: 8px; }
.tab-panel.active { display: block; }

/* COVERS */
.section-header { padding: 13px 15px 9px; border-bottom: 1px solid var(--border); }
.section-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; font-style: italic; }
.section-desc { font-size: 12.5px; color: var(--mid); margin-top: 3px; line-height: 1.4; }

.artist-group { margin-bottom: 0; }
.artist-header {
  padding: 10px 15px 8px; background: var(--ink); color: var(--cream);
  display: flex; align-items: baseline; justify-content: space-between;
  position: sticky; top: 0; z-index: 5;
}
.artist-name { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; font-style: italic; }
.artist-count { font-size: 11px; color: #aaa; letter-spacing: 1px; }

.covers-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--border); }

.cover-card { background: var(--card-bg); cursor: pointer; overflow: hidden; aspect-ratio: 3/4; display: flex; flex-direction: column; }
.cover-card:active { opacity: 0.8; }
.cover-img-wrap { flex: 1; overflow: hidden; background: #e8e4dc; display: flex; align-items: center; justify-content: center; position: relative; }
.cover-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.loader { position: absolute; width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.cover-caption { padding: 6px 9px 7px; border-top: 1px solid var(--border); background: var(--cream); flex-shrink: 0; }
.cover-date { font-family: 'Playfair Display', serif; font-size: 11.5px; font-weight: 700; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(26,26,26,0.93); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; padding-top: calc(var(--safe-top) + 20px); padding-bottom: calc(var(--safe-bot) + 20px); }
.modal-overlay.open { display: flex; }
.modal-card { background: var(--cream); border-radius: 4px; max-width: 380px; width: 100%; max-height: 88vh; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; }
.modal-img { width: 100%; display: block; background: #e8e4dc; }
.modal-body { padding: 15px; border-top: 2px solid var(--ink); }
.modal-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
.modal-artist { font-size: 13px; color: var(--mid); font-style: italic; margin: 4px 0 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.modal-desc { font-size: 15px; line-height: 1.65; color: #2a2a2a; }
.modal-close { position: absolute; top: 10px; right: 10px; background: var(--ink); color: var(--cream); border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
.modal-close:active { opacity: 0.7; }
.modal-link { display: inline-block; margin-top: 12px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--red); text-decoration: none; border-bottom: 1px solid var(--red); padding-bottom: 1px; cursor: pointer; }

/* ARTISTS */
.artists-content { padding: 16px; }
.artist-card { margin-bottom: 28px; }
.artist-card-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: var(--ink); line-height: 1; }
.artist-card-dates { font-size: 12px; letter-spacing: 1.5px; color: var(--mid); text-transform: uppercase; margin: 3px 0 8px; }
.artist-card-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; font-style: italic; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.artist-card-text { font-size: 15px; line-height: 1.7; color: #2a2a2a; }
.pull-quote { border-left: 3px solid var(--red); padding: 8px 12px; margin: 14px 0; font-family: 'Playfair Display', serif; font-size: 14.5px; font-style: italic; line-height: 1.5; background: rgba(200,16,46,0.05); }
.divider { text-align: center; color: var(--border); font-size: 16px; letter-spacing: 8px; padding: 8px 0; }

/* ABOUT */
.about-content { padding: 16px; }
.about-hero { background: var(--ink); color: var(--cream); padding: 22px 16px; margin: -16px -16px 20px; text-align: center; }
.about-hero-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 900; font-style: italic; letter-spacing: -1px; }
.about-hero-sub { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #999; margin-top: 4px; }
.info-row { display: flex; border-bottom: 1px solid var(--border); padding: 11px 0; align-items: baseline; }
.info-label { font-size: 10.5px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--mid); width: 120px; flex-shrink: 0; }
.info-value { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; flex: 1; }
.about-section-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 2px solid var(--ink); }
.about-text { font-size: 15px; line-height: 1.7; color: #2a2a2a; margin-bottom: 10px; }
.tags-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
.tag-chip { background: var(--ink); color: var(--cream); padding: 6px 12px; border-radius: 3px; font-family: 'Playfair Display', serif; font-size: 12px; font-style: italic; }

/* TABBAR */
.tabbar { background: var(--cream); border-top: 2px solid var(--ink); display: flex; padding-bottom: var(--safe-bot); flex-shrink: 0; }
.tab-btn { flex: 1; border: none; background: none; padding: 9px 4px 7px; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: var(--mid); font-family: 'EB Garamond', serif; transition: color 0.2s; }
.tab-btn:active { opacity: 0.7; }
.tab-btn.active { color: var(--ink); }
.tab-icon { font-size: 19px; line-height: 1; }
.tab-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
.tab-btn.active .tab-label { font-weight: 600; border-bottom: 1.5px solid var(--ink); }

/* LOADING / ERROR */
.loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--mid); }
.spin-big { width: 34px; height: 34px; border: 2px solid var(--border); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 14px; }
.loading-text { font-style: italic; font-size: 14px; }
.loading-step { font-size: 12px; color: #bbb; margin-top: 6px; }
.error-state { padding: 30px 20px; text-align: center; color: var(--mid); }
.retry-btn { margin-top: 12px; background: var(--ink); color: var(--cream); border: none; padding: 8px 20px; border-radius: 3px; font-family: 'EB Garamond', serif; font-size: 14px; cursor: pointer; }

/* QUIZ */
.quiz-wrap { padding: 0; display: flex; flex-direction: column; height: 100%; }
.quiz-progress-bar { height: 3px; background: var(--border); flex-shrink: 0; position: relative; }
.quiz-progress-fill { height: 100%; background: var(--red); transition: width 0.4s ease; }
.quiz-meta { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px 6px; flex-shrink: 0; }
.quiz-counter { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--mid); }
.quiz-score-badge { background: var(--ink); color: var(--cream); font-family: 'Playfair Display', serif; font-size: 13px; padding: 3px 10px; border-radius: 12px; }
.quiz-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px 16px; }
.quiz-question { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; line-height: 1.4; margin: 8px 0 18px; color: var(--ink); }
.quiz-choices { display: flex; flex-direction: column; gap: 10px; }
.choice-btn { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 4px; padding: 13px 14px; text-align: left; cursor: pointer; font-family: 'EB Garamond', serif; font-size: 15px; color: var(--ink); line-height: 1.35; display: flex; align-items: center; gap: 10px; transition: border-color 0.15s, background 0.15s; }
.choice-btn:active { opacity: 0.85; }
.choice-btn.correct { background: #e8f5e9; border-color: #2e7d32; color: #1b5e20; }
.choice-btn.wrong { background: #fce8e8; border-color: var(--red); color: #7f0000; }
.choice-btn.reveal-correct { background: #e8f5e9; border-color: #2e7d32; color: #1b5e20; }
.choice-letter { width: 26px; height: 26px; border-radius: 50%; background: var(--border); color: var(--ink); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; font-family: 'Playfair Display', serif; }
.choice-btn.correct .choice-letter { background: #2e7d32; color: #fff; }
.choice-btn.wrong .choice-letter { background: var(--red); color: #fff; }
.choice-btn.reveal-correct .choice-letter { background: #2e7d32; color: #fff; }
.choice-btn:disabled { cursor: default; }
.quiz-feedback { margin-top: 14px; padding: 10px 13px; border-radius: 4px; font-size: 14px; line-height: 1.5; display: none; }
.quiz-feedback.show { display: block; }
.quiz-feedback.ok { background: #e8f5e9; border-left: 3px solid #2e7d32; color: #1b5e20; }
.quiz-feedback.ko { background: #fce8e8; border-left: 3px solid var(--red); color: #7f0000; }
.quiz-next-btn { margin-top: 16px; width: 100%; background: var(--ink); color: var(--cream); border: none; border-radius: 4px; padding: 13px; font-family: 'Playfair Display', serif; font-size: 15px; font-style: italic; cursor: pointer; display: none; }
.quiz-next-btn.show { display: block; }
.quiz-next-btn:active { opacity: 0.8; }
.quiz-results { padding: 24px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
.results-medal { font-size: 56px; margin-bottom: 10px; }
.results-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; margin-bottom: 6px; }
.results-score { font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 900; color: var(--red); line-height: 1; margin: 10px 0 4px; }
.results-total { font-size: 14px; color: var(--mid); margin-bottom: 16px; }
.results-msg { font-size: 16px; line-height: 1.6; color: #333; max-width: 280px; margin-bottom: 24px; font-style: italic; }
.replay-btn { background: var(--ink); color: var(--cream); border: none; border-radius: 4px; padding: 13px 32px; font-family: 'Playfair Display', serif; font-size: 16px; font-style: italic; cursor: pointer; }
.replay-btn:active { opacity: 0.8; }

/* MES APPS */
.apps-content { padding: 14px 12px 20px; }
.apps-header { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; font-style: italic; padding: 6px 4px 12px; border-bottom: 2px solid var(--ink); margin-bottom: 14px; }
.apps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 10px; }
.app-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
.app-cell:active { opacity: 0.7; }
.app-icon-wrap { width: 64px; height: 64px; border-radius: 14px; overflow: hidden; background: #e8e4dc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
.app-icon-wrap img { width: 64px; height: 64px; display: block; border-radius: 14px; }
.app-icon-loader { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.8s linear infinite; }
.app-name { font-family: 'EB Garamond', serif; font-size: 11px; text-align: center; line-height: 1.3; color: var(--ink); max-width: 72px; }
.apps-badge-row { margin-top: 22px; text-align: center; padding-top: 16px; border-top: 1px solid var(--border); }
.apps-badge-row img { height: 36px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <button class="lang-btn" onclick="toggleLang()">
      <span class="flag" id="flagIcon">🇬🇧</span>
      <span id="langLabel">EN</span>
    </button>
    <div class="header-center">
      <div class="masthead">Iconic Covers</div>
      <div class="header-sub" id="headerSub">Illustrations · 1925–1927</div>
    </div>
    <div class="header-spacer"></div>
  </div>

  <div class="content">
    <div class="tab-panel active" id="panel-covers">
      <div class="section-header">
        <div class="section-title" id="coversTitle">Iconic Covers</div>
        <div class="section-desc" id="coversDesc">Public domain illustrations from Wikimedia Commons, grouped by artist</div>
      </div>
      <div id="coversContainer"></div>
    </div>

    <div class="tab-panel" id="panel-artists">
      <div class="artists-content" id="artistsContent"></div>
    </div>

    <div class="tab-panel" id="panel-quiz">
      <div id="quizContainer"></div>
    </div>

    <div class="tab-panel" id="panel-about">
      <div class="about-content" id="aboutContent"></div>
    </div>
    <div class="tab-panel" id="panel-myapps">
      <div class="apps-content" id="appsContent"></div>
    </div>
  </div>

  <div class="tabbar">
    <button class="tab-btn active" id="tab-covers" onclick="switchTab('covers')">
      <span class="tab-icon">🖼</span>
      <span class="tab-label" data-fr="Couvertures" data-en="Covers">Covers</span>
    </button>
    <button class="tab-btn" id="tab-artists" onclick="switchTab('artists')">
      <span class="tab-icon">🎨</span>
      <span class="tab-label" data-fr="Artistes" data-en="Artists">Artists</span>
    </button>
    <button class="tab-btn" id="tab-quiz" onclick="switchTab('quiz')">
      <span class="tab-icon">✏️</span>
      <span class="tab-label" data-fr="Quiz" data-en="Quiz">Quiz</span>
    </button>
    <button class="tab-btn" id="tab-about" onclick="switchTab('about')">
      <span class="tab-icon">ℹ️</span>
      <span class="tab-label" data-fr="À propos" data-en="About">About</span>
    </button>
    <button class="tab-btn" id="tab-myapps" onclick="switchTab('myapps')">
      <span class="tab-icon">📲</span>
      <span class="tab-label" data-fr="Mes apps" data-en="My apps">My apps</span>
    </button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleModalClick(event)">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-artist" id="modalArtist"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-link" id="modalLink" onclick="openWiki()"></div>
    </div>
  </div>
</div>

<script>
const WIKI = 'https://commons.wikimedia.org/w/api.php';
let lang = 'en';
let allGroups = [];
let flatCovers = [];
let currentModalUrl = '';

// ── ARTIST DESCRIPTIONS (no magazine name) ──
const ARTIST_INFO = {
  'Rea Irvin': {
    fr: 'Illustrateur et directeur artistique américain (1881–1972). Il créa le personnage d\'Eustace Tilley — dandy aristocratique observant un papillon à travers son monocle — devenu l\'une des icônes les plus célèbres de l\'illustration américaine du XXe siècle.',
    en: 'American illustrator and art director (1881–1972). He created the character of Eustace Tilley — an aristocratic dandy observing a butterfly through his monocle — which became one of the most celebrated icons of 20th-century American illustration.'
  },
  'Ilonka Karasz': {
    fr: 'Illustratrice et designer hongro-américaine (1896–1981). Pionnière du design moderne aux États-Unis, elle a réalisé plus de 186 illustrations de couverture entre 1925 et 1973. Ses compositions aériennes, souvent vues de haut et aux palettes de couleurs inhabituelles, sont immédiatement reconnaissables.',
    en: 'Hungarian-American illustrator and designer (1896–1981). A pioneer of modern design in the United States, she created over 186 cover illustrations between 1925 and 1973. Her airy compositions, often viewed from above with unusual color palettes, are instantly recognizable.'
  },
  'Stanley W. Reynolds': {
    fr: 'Illustrateur américain actif dans les années 1920. Il a contribué de nombreuses couvertures dans les premières années de parution, caractérisées par un trait élégant et des scènes de la vie quotidienne américaine.',
    en: 'American illustrator active in the 1920s. He contributed many covers in the early years of publication, characterized by an elegant line and scenes of everyday American life.'
  }
};

function artistDesc(a) {
  return ARTIST_INFO[a] ? ARTIST_INFO[a][lang] : (lang==='fr' ? 'Artiste illustrateur américain.' : 'American illustrator.');
}

// ── WIKIMEDIA API ──
async function api(params) {
  const u = WIKI + '?' + new URLSearchParams({...params, format:'json', origin:'*'});
  return (await fetch(u)).json();
}

async function getSubcats(cat) {
  const d = await api({action:'query', list:'categorymembers', cmtitle:'Category:'+cat, cmtype:'subcat', cmlimit:'50'});
  return (d.query?.categorymembers||[]).map(m => m.title.replace('Category:',''));
}

async function getFiles(cat) {
  let files=[], cont;
  do {
    const p = {action:'query', list:'categorymembers', cmtitle:'Category:'+cat, cmtype:'file', cmlimit:'50'};
    if (cont) p.cmcontinue = cont;
    const d = await api(p);
    files.push(...(d.query?.categorymembers||[]).map(m => m.title.replace('File:','')));
    cont = d.continue?.cmcontinue;
  } while (cont);
  return files;
}

async function getThumbs(files) {
  const map = {};
  for (let i=0; i<files.length; i+=40) {
    const batch = files.slice(i, i+40);
    const titles = batch.map(f=>'File:'+f).join('|');
    const d = await api({action:'query', titles, prop:'imageinfo', iiprop:'url|thumburl|size', iiurlwidth:'500'});
    for (const pg of Object.values(d.query?.pages||{})) {
      if (pg.imageinfo?.[0]) {
        const f = pg.title.replace('File:','');
        map[f] = { thumb: pg.imageinfo[0].thumburl || pg.imageinfo[0].url, desc: 'https://commons.wikimedia.org/wiki/File:'+encodeURIComponent(f) };
      }
    }
  }
  return map;
}

function parseDate(f) {
  const m1 = f.match(/(\d{1,2})([A-Za-z]{3})(\d{4})/);
  if (m1) return `${m1[1]} ${m1[2]} ${m1[3]}`;
  const m2 = f.match(/(\d{4})(\d{2})(\d{2})/);
  if (m2) { const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${m2[3]} ${mo[+m2[2]-1]} ${m2[1]}`; }
  const m3 = f.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m3) { const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${m3[3]} ${mo[+m3[2]-1]} ${m3[1]}`; }
  return f.replace(/\.(jpg|jpeg|png|webp|gif)$/i,'').replace(/_/g,' ');
}

function toFr(d) {
  const m = {Jan:'janv.',Feb:'févr.',Mar:'mars',Apr:'avr.',May:'mai',Jun:'juin',Jul:'juil.',Aug:'août',Sep:'sept.',Oct:'oct.',Nov:'nov.',Dec:'déc.'};
  return d.replace(/\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\b/, x => m[x]||x);
}

function artistFromCat(c) {
  return c.replace(/'s?\s+New Yorker covers?/i,'').replace(/\s+New Yorker.*/i,'').trim();
}

async function loadCovers() {
  const box = document.getElementById('coversContainer');
  setLoading(box, lang==='fr'?'Chargement…':'Loading…', lang==='fr'?'Interrogation de Wikimedia Commons':'Querying Wikimedia Commons');
  try {
    const subcats = await getSubcats('The_New_Yorker_covers');
    const mainFiles = await getFiles('The_New_Yorker_covers');
    const artistCats = subcats.filter(s => /New Yorker covers?/i.test(s));

    const groups = [];
    for (const cat of artistCats) {
      const artist = artistFromCat(cat);
      const files = await getFiles(cat.replace(/ /g,'_'));
      if (files.length) groups.push({artist, files});
    }

    const grouped = new Set(groups.flatMap(g=>g.files));
    const other = mainFiles.filter(f => !grouped.has(f));
    if (other.length) groups.push({artist: lang==='fr'?'Artistes divers':'Various Artists', files: other});

    if (!groups.length) { showErr(box); return; }

    const total = groups.reduce((n,g)=>n+g.files.length,0);
    setLoading(box, lang==='fr'?'Chargement des images…':'Loading images…', `${total} ${lang==='fr'?'illustrations trouvées':'illustrations found'}`);

    const thumbMap = await getThumbs(groups.flatMap(g=>g.files));

    allGroups = groups.map(g => ({
      artist: g.artist,
      covers: g.files.filter(f=>thumbMap[f]).map(f=>({
        file:f, en:parseDate(f), fr:toFr(parseDate(f)),
        thumb:thumbMap[f].thumb, url:thumbMap[f].desc
      }))
    })).filter(g=>g.covers.length);

    flatCovers = allGroups.flatMap(g => g.covers.map(c=>({...c, artist:g.artist})));
    renderCovers();
  } catch(e) { console.error(e); showErr(box); }
}

function setLoading(el, msg, sub) {
  el.innerHTML = `<div class="loading-state"><div class="spin-big"></div><div class="loading-text">${msg}</div>${sub?`<div class="loading-step">${sub}</div>`:''}</div>`;
}
function showErr(el) {
  el.innerHTML = `<div class="error-state"><p>${lang==='fr'?'Impossible de charger les illustrations.':'Unable to load illustrations.'}</p><button class="retry-btn" onclick="loadCovers()">${lang==='fr'?'Réessayer':'Retry'}</button></div>`;
}

function renderCovers() {
  const box = document.getElementById('coversContainer');
  if (!allGroups.length) { showErr(box); return; }
  box.innerHTML = '';
  for (const g of allGroups) {
    const n = g.covers.length;
    const cnt = lang==='fr'?`${n} illustration${n>1?'s':''}`:`${n} illustration${n>1?'s':''}`;
    const el = document.createElement('div');
    el.className = 'artist-group';
    el.innerHTML = `<div class="artist-header"><div class="artist-name">${g.artist}</div><div class="artist-count">${cnt}</div></div>`;
    const grid = document.createElement('div');
    grid.className = 'covers-grid';
    g.covers.forEach(c => {
      const idx = flatCovers.findIndex(x=>x.file===c.file);
      const date = lang==='fr'?c.fr:c.en;
      const card = document.createElement('div');
      card.className = 'cover-card';
      card.onclick = ()=>openModal(idx);
      card.innerHTML = `<div class="cover-img-wrap"><div class="loader" id="l${idx}"></div><img src="${c.thumb}" alt="${date}" loading="lazy" onload="document.getElementById('l${idx}').style.display='none'" onerror="document.getElementById('l${idx}').style.display='none';this.style.display='none'"></div><div class="cover-caption"><div class="cover-date">${date}</div></div>`;
      grid.appendChild(card);
    });
    el.appendChild(grid);
    box.appendChild(el);
  }
}

let qState = { idx:0, score:0, answered:false, questions:[] };

function shuffleQuestions() {
  const q = [...QUIZ_Q];
  for (let i=q.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [q[i],q[j]] = [q[j],q[i]];
  }
  return q.slice(0, 10);
}

function initQuiz() {
  qState = { idx:0, score:0, answered:false, questions: shuffleQuestions() };
  renderQuestion();
}

function renderQuestion() {
  const box = document.getElementById('quizContainer');
  const total = qState.questions.length;
  const i = qState.idx;
  if (i >= total) { renderResults(); return; }
  const q = qState.questions[i];
  const pct = Math.round((i/total)*100);
  const choices = q.choices[lang];
  const LETTERS = ['A','B','C','D'];
  box.innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
      <div class="quiz-meta">
        <div class="quiz-counter">${lang==='fr'?'Question':'Question'} ${i+1} / ${total}</div>
        <div class="quiz-score-badge">Score : ${qState.score}</div>
      </div>
      <div class="quiz-body">
        <div class="quiz-question">${lang==='fr'?q.fr:q.en}</div>
        <div class="quiz-choices">
          ${choices.map((c,ci)=>`
            <button class="choice-btn" id="choice-${ci}" onclick="pickAnswer(${ci})">
              <span class="choice-letter">${LETTERS[ci]}</span>${c}
            </button>`).join('')}
        </div>
        <div class="quiz-feedback" id="qfeedback"></div>
        <button class="quiz-next-btn" id="qnext" onclick="nextQuestion()">
          ${i+1<total ? (lang==='fr'?'Question suivante →':'Next question →') : (lang==='fr'?'Voir les résultats →':'See results →')}
        </button>
      </div>
    </div>`;
}

function pickAnswer(ci) {
  if (qState.answered) return;
  qState.answered = true;
  const q = qState.questions[qState.idx];
  const correct = q.answer;
  const isRight = ci === correct;
  if (isRight) qState.score++;
  for (let i=0;i<4;i++) {
    const btn = document.getElementById('choice-'+i);
    if (!btn) continue;
    btn.disabled = true;
    if (i===ci && isRight) btn.classList.add('correct');
    else if (i===ci && !isRight) btn.classList.add('wrong');
    else if (i===correct) btn.classList.add('reveal-correct');
  }
  const fb = document.getElementById('qfeedback');
  fb.className = 'quiz-feedback show ' + (isRight?'ok':'ko');
  fb.textContent = (isRight ? (lang==='fr'?'✓ Correct ! ':'✓ Correct! ') : (lang==='fr'?'✗ Incorrect. ':'✗ Incorrect. ')) + (lang==='fr'?q.explain.fr:q.explain.en);
  document.getElementById('qnext').classList.add('show');
  document.querySelector('.quiz-score-badge').textContent = 'Score : '+qState.score;
}

function nextQuestion() {
  qState.idx++;
  qState.answered = false;
  renderQuestion();
}

function renderResults() {
  const box = document.getElementById('quizContainer');
  const s = qState.score, t = qState.questions.length;
  const pct = Math.round((s/t)*100);
  let medal, tfr, ten, mfr, men;
  if (pct>=90)      { medal='🏆'; tfr='Expert !';       ten='Expert!';        mfr='Vous connaissez parfaitement ces artistes illustrateurs. Bravo !'; men='You have perfect knowledge of these illustrator-artists. Bravo!' }
  else if (pct>=70) { medal='🎖'; tfr='Très bien !';    ten='Very good!';     mfr='Belle connaissance de l\'illustration américaine des années 1920.'; men='Great knowledge of 1920s American illustration.' }
  else if (pct>=50) { medal='🎨'; tfr='Pas mal !';      ten='Not bad!';       mfr='Vous connaissez les grandes lignes. Consultez l\'onglet Artistes !'; men='You know the basics. Check the Artists tab to learn more!' }
  else              { medal='🖊'; tfr='À approfondir…'; ten='Keep learning…'; mfr='Ces artistes ont encore des secrets à vous révéler. Réessayez !'; men='These artists still have secrets to reveal. Try again!' }
  box.innerHTML = `
    <div class="quiz-results">
      <div class="results-medal">${medal}</div>
      <div class="results-title">${lang==='fr'?tfr:ten}</div>
      <div class="results-score">${s}/${t}</div>
      <div class="results-total">${pct}% ${lang==='fr'?'de bonnes réponses':'correct'}</div>
      <div class="results-msg">${lang==='fr'?mfr:men}</div>
      <button class="replay-btn" onclick="initQuiz()">${lang==='fr'?'Rejouer':'Play again'}</button>
    </div>`;
}

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab==='artists') renderArtists();
  if (tab==='about') renderAbout();
  if (tab==='quiz') initQuiz();
  if (tab==='myapps') renderMyApps();
}

// ── LANGUAGE ──
function toggleLang() {
  lang = lang==='fr'?'en':'fr';
  document.getElementById('flagIcon').textContent = lang==='fr'?'🇬🇧':'🇫🇷';
  document.getElementById('langLabel').textContent = lang==='fr'?'EN':'FR';
  document.querySelectorAll('.tab-label').forEach(el=>{ el.textContent=el.dataset[lang]; });
  document.getElementById('coversTitle').textContent = lang==='fr'?'Couvertures emblématiques':'Iconic Covers';
  document.getElementById('coversDesc').textContent = lang==='fr'
    ? 'Illustrations du domaine public issues de Wikimedia Commons, groupées par artiste'
    : 'Public domain illustrations from Wikimedia Commons, grouped by artist';
  if (allGroups.length) renderCovers();
  const a = document.querySelector('.tab-panel.active')?.id.replace('panel-','');
  if (a==='artists') renderArtists();
  if (a==='about') renderAbout();
  if (a==='quiz') initQuiz();
  if (a==='myapps') renderMyApps();
}

function renderMyApps() {
  const box = document.getElementById('appsContent');
  const title = lang==='fr' ? 'Mes autres applications' : 'My other apps';
  let html = `<div class="apps-header">${title}</div><div class="apps-grid">`;
  MY_APPS.forEach(app => {
    html += `
      <div class="app-cell" onclick="openApp(${app.id})">
        <div class="app-icon-wrap" id="wrap-${app.id}">
          <div class="app-icon-loader" id="loader-${app.id}"></div>
        </div>
        <div class="app-name">${app.name}</div>
      </div>`;
  });
  html += `</div>
    <div class="apps-badge-row">
      <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/fr-fr" alt="App Store">
    </div>`;
  box.innerHTML = html;

  // Load icons via JSONP
  MY_APPS.forEach(app => { loadAppIcon(app.id); });
}

function loadAppIcon(numId) {
  window['itcb'+numId] = function(d) {
    const loader = document.getElementById('loader-'+numId);
    if (!loader) return;
    if (d.results && d.results.length > 0) {
      const img = document.createElement('img');
      img.src = d.results[0].artworkUrl60;
      img.alt = '';
      loader.parentNode.replaceChild(img, loader);
    } else {
      if (loader) loader.style.display = 'none';
    }
  };
  const s = document.createElement('script');
  s.src = 'https://itunes.apple.com/lookup?id=' + numId + '&callback=itcb' + numId;
  s.onerror = function() {
    const loader = document.getElementById('loader-'+numId);
    if (loader) loader.style.display = 'none';
  };
  document.body.appendChild(s);
}

function openApp(id) {
  window.open('https://apps.apple.com/app/id' + id, '_system');
}
