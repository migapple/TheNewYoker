<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The New Yorker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --ink: #1a1a1a;
    --red: #c8102e;
    --gold: #b8960c;
    --mid: #888;
    --border: #d0c8b8;
    --card-bg: #faf7f2;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--ink);
    overflow: hidden;
  }

  #app {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column;
    padding-top: var(--safe-top);
    background: var(--cream);
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--ink);
  }

  /* ── HEADER ── */
  .header {
    background: var(--cream);
    border-bottom: 2px solid var(--ink);
    padding: 8px 16px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute; bottom: -5px; left: 0; right: 0;
    height: 2px; background: var(--ink);
  }

  .header-title {
    flex: 1;
    text-align: center;
  }
  .header-title .masthead {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
    color: var(--ink);
  }
  .header-title .subtitle {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--mid);
    margin-top: 1px;
  }

  .lang-btn {
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .lang-btn:active { opacity: 0.7; }
  .flag-icon { font-size: 18px; }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .tab-panel {
    position: absolute; inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: none;
    padding-bottom: 10px;
  }
  .tab-panel.active { display: block; }

  /* ── COVERS GRID ── */
  .section-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    font-style: italic;
  }
  .section-desc {
    font-size: 13px;
    color: var(--mid);
    margin-top: 3px;
    line-height: 1.4;
  }

  .covers-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: var(--border);
    margin-top: 0;
  }

  .cover-card {
    background: var(--card-bg);
    cursor: pointer;
    overflow: hidden;
    position: relative;
    aspect-ratio: 3/4;
    display: flex; flex-direction: column;
  }
  .cover-card:active { opacity: 0.85; }

  .cover-img-wrap {
    flex: 1;
    overflow: hidden;
    background: #e8e4dc;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .cover-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s;
  }
  .cover-img-wrap .loader {
    position: absolute;
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .cover-info {
    padding: 7px 9px 8px;
    border-top: 1px solid var(--border);
    background: var(--cream);
  }
  .cover-date {
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
  }
  .cover-artist {
    font-size: 11px;
    color: var(--mid);
    margin-top: 1px;
    font-style: italic;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,26,26,0.92);
    z-index: 100;
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
    padding-top: calc(var(--safe-top) + 20px);
    padding-bottom: calc(var(--safe-bot) + 20px);
  }
  .modal-overlay.open { display: flex; }

  .modal-card {
    background: var(--cream);
    border-radius: 4px;
    max-width: 380px; width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  .modal-img-wrap {
    width: 100%;
    background: #e8e4dc;
    display: flex; align-items: center; justify-content: center;
    min-height: 200px;
  }
  .modal-img-wrap img {
    width: 100%; display: block;
  }
  .modal-body {
    padding: 16px;
    border-top: 2px solid var(--ink);
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700;
    margin-bottom: 4px;
  }
  .modal-meta {
    font-size: 13px; color: var(--mid);
    font-style: italic;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .modal-desc {
    font-size: 15px; line-height: 1.6;
    color: #333;
  }
  .modal-close {
    position: absolute; top: 10px; right: 10px;
    background: var(--ink); color: var(--cream);
    border: none; border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    z-index: 10;
  }
  .modal-close:active { opacity: 0.7; }

  /* ── HISTORY ── */
  .history-content {
    padding: 16px;
  }
  .era-block {
    margin-bottom: 28px;
  }
  .era-year {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 900;
    color: var(--red);
    line-height: 1;
  }
  .era-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 700;
    font-style: italic;
    margin-bottom: 8px;
    margin-top: 2px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .era-text {
    font-size: 15px; line-height: 1.7;
    color: #2a2a2a;
  }
  .era-text + .era-text { margin-top: 8px; }

  .pull-quote {
    border-left: 3px solid var(--red);
    padding: 8px 12px;
    margin: 16px 0;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-style: italic;
    line-height: 1.5;
    background: rgba(200,16,46,0.05);
  }

  /* ── ABOUT ── */
  .about-content {
    padding: 16px;
  }
  .about-hero {
    background: var(--ink);
    color: var(--cream);
    padding: 20px 16px;
    margin: -16px -16px 20px;
    text-align: center;
  }
  .about-hero-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px; font-weight: 900;
    font-style: italic;
    letter-spacing: -1px;
  }
  .about-hero-sub {
    font-size: 12px; letter-spacing: 3px;
    text-transform: uppercase;
    color: #999;
    margin-top: 4px;
  }
  .info-row {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 11px 0;
    align-items: baseline;
  }
  .info-label {
    font-size: 11px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--mid);
    width: 110px; flex-shrink: 0;
  }
  .info-value {
    font-family: 'Playfair Display', serif;
    font-size: 15px; font-weight: 600;
    flex: 1;
  }
  .about-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px; font-weight: 700;
    margin: 20px 0 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--ink);
  }
  .about-text {
    font-size: 15px; line-height: 1.7; color: #2a2a2a;
    margin-bottom: 10px;
  }
  .contributors-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-top: 10px;
  }
  .contributor-chip {
    background: var(--ink); color: var(--cream);
    padding: 6px 10px; border-radius: 3px;
    font-family: 'Playfair Display', serif;
    font-size: 12px; font-style: italic;
    text-align: center;
  }

  /* ── TABBAR ── */
  .tabbar {
    background: var(--cream);
    border-top: 2px solid var(--ink);
    display: flex;
    padding-bottom: var(--safe-bot);
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1; border: none; background: none;
    padding: 10px 4px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; color: var(--mid);
    font-family: 'EB Garamond', serif;
    font-size: 11px; letter-spacing: 0.5px;
    transition: color 0.2s;
  }
  .tab-btn:active { opacity: 0.7; }
  .tab-btn.active { color: var(--ink); }
  .tab-btn .tab-icon { font-size: 20px; line-height: 1; }
  .tab-btn .tab-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  .tab-btn.active .tab-label {
    font-weight: 600;
    border-bottom: 1.5px solid var(--ink);
  }

  /* Loading state */
  .loading-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 20px;
    color: var(--mid);
  }
  .loading-state .spin-big {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-bottom: 14px;
  }
  .loading-text { font-style: italic; font-size: 14px; }

  .error-state {
    padding: 30px 20px; text-align: center; color: var(--mid);
  }
  .retry-btn {
    margin-top: 12px; background: var(--ink); color: var(--cream);
    border: none; padding: 8px 20px; border-radius: 3px;
    font-family: 'EB Garamond', serif; font-size: 14px; cursor: pointer;
  }

  /* decorative divider */
  .divider {
    text-align: center; color: var(--border);
    font-size: 18px; letter-spacing: 8px;
    padding: 10px 0;
  }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <button class="lang-btn" id="langToggle" onclick="toggleLang()">
      <span class="flag-icon" id="flagIcon">🇬🇧</span>
      <span id="langLabel">EN</span>
    </button>
    <div class="header-title">
      <div class="masthead">The New Yorker</div>
      <div class="subtitle" id="headerSubtitle">Magazine · est. 1925</div>
    </div>
    <div style="width:62px"></div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- TAB: COVERS -->
    <div class="tab-panel active" id="panel-covers">
      <div class="section-header">
        <div class="section-title" id="coversTitle">Iconic Covers</div>
        <div class="section-desc" id="coversDesc">Public domain covers from Wikimedia Commons (1925–1927)</div>
      </div>
      <div id="coversContainer"></div>
    </div>

    <!-- TAB: HISTORY -->
    <div class="tab-panel" id="panel-history">
      <div class="history-content" id="historyContent"></div>
    </div>

    <!-- TAB: ABOUT -->
    <div class="tab-panel" id="panel-about">
      <div class="about-content" id="aboutContent"></div>
    </div>

  </div>

  <!-- TABBAR -->
  <div class="tabbar">
    <button class="tab-btn active" id="tab-covers" onclick="switchTab('covers')">
      <span class="tab-icon">🖼</span>
      <span class="tab-label" data-fr="Couvertures" data-en="Covers">Covers</span>
    </button>
    <button class="tab-btn" id="tab-history" onclick="switchTab('history')">
      <span class="tab-icon">📜</span>
      <span class="tab-label" data-fr="Histoire" data-en="History">History</span>
    </button>
    <button class="tab-btn" id="tab-about" onclick="switchTab('about')">
      <span class="tab-icon">ℹ️</span>
      <span class="tab-label" data-fr="À propos" data-en="About">About</span>
    </button>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-img-wrap">
      <img id="modalImg" src="" alt="">
    </div>
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-desc" id="modalDesc"></div>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let lang = 'en';
let covers = [];

// ── CURATED COVERS (public domain, Wikimedia Commons) ──
// These are early New Yorker covers (1925-1927) confirmed as public domain
const CURATED_COVERS = [
  {
    file: 'New_Yorker_19250221.jpg',
    date_fr: '21 février 1925',
    date_en: 'February 21, 1925',
    artist: 'Rea Irvin',
    desc_fr: 'La toute première couverture du New Yorker. Elle présente Eustace Tilley, le dandy emblématique du magazine, en train d\'examiner un papillon avec son monocle. Ce personnage est dessiné par Rea Irvin et deviendra le symbole officieux du New Yorker.',
    desc_en: 'The very first cover of The New Yorker. It features Eustace Tilley, the magazine\'s iconic dandy, examining a butterfly through his monocle. Drawn by Rea Irvin, this character became the unofficial mascot of the magazine.',
    wiki: 'New_Yorker_19250221.jpg'
  },
  {
    file: 'New_Yorker_19260220.jpg',
    date_fr: '20 février 1926',
    date_en: 'February 20, 1926',
    artist: 'Rea Irvin',
    desc_fr: 'Couverture du premier anniversaire du New Yorker. Rea Irvin reprend Eustace Tilley pour célébrer la première année du magazine, établissant ainsi une tradition annuelle.',
    desc_en: 'First anniversary cover of The New Yorker. Rea Irvin reprises Eustace Tilley to celebrate the magazine\'s first year, establishing what would become an annual tradition.',
    wiki: 'New_Yorker_19260220.jpg'
  },
  {
    file: 'New_Yorker_19270219.jpg',
    date_fr: '19 février 1927',
    date_en: 'February 19, 1927',
    artist: 'Rea Irvin',
    desc_fr: 'Troisième anniversaire. La couverture anniversaire annuelle avec Eustace Tilley devient une tradition fondatrice du magazine.',
    desc_en: 'Third anniversary. The annual anniversary cover featuring Eustace Tilley becomes a founding tradition of the magazine.',
    wiki: 'New_Yorker_19270219.jpg'
  },
  {
    file: 'New_Yorker_19250228.jpg',
    date_fr: '28 février 1925',
    date_en: 'February 28, 1925',
    artist: 'Various',
    desc_fr: 'Deuxième numéro du New Yorker, publié une semaine après le lancement historique du 21 février 1925.',
    desc_en: 'Second issue of The New Yorker, published one week after the historic launch of February 21, 1925.',
    wiki: 'New_Yorker_19250228.jpg'
  },
  {
    file: 'New_Yorker_19250307.jpg',
    date_fr: '7 mars 1925',
    date_en: 'March 7, 1925',
    artist: 'Various',
    desc_fr: 'Troisième numéro du New Yorker dans sa première année de publication.',
    desc_en: 'Third issue of The New Yorker in its inaugural year of publication.',
    wiki: 'New_Yorker_19250307.jpg'
  },
  {
    file: 'New_Yorker_19260306.jpg',
    date_fr: '6 mars 1926',
    date_en: 'March 6, 1926',
    artist: 'Various',
    desc_fr: 'Couverture de la deuxième année du magazine, période durant laquelle le New Yorker s\'impose progressivement dans le paysage culturel américain.',
    desc_en: 'Cover from the magazine\'s second year, a period during which The New Yorker gradually established itself in the American cultural landscape.',
    wiki: 'New_Yorker_19260306.jpg'
  },
];

// Wikimedia Commons thumbnail URL builder
function wikiThumb(filename, size) {
  // Encode filename
  const name = filename.replace(/ /g, '_');
  const md5 = md5Hash(name);
  const a = md5[0];
  const ab = md5[0] + md5[1];
  return `https://upload.wikimedia.org/wikipedia/commons/thumb/${a}/${ab}/${encodeURIComponent(name)}/${size}px-${encodeURIComponent(name)}`;
}

// Simple MD5 for Wikimedia path (we use the API instead)
// We'll use the Wikimedia API to get proper thumb URLs
async function fetchWikimediaThumb(filename, size) {
  const url = `https://commons.wikimedia.org/w/api.php?action=query&titles=File:${encodeURIComponent(filename)}&prop=imageinfo&iiprop=url|thumburl|size&iiurlwidth=${size}&format=json&origin=*`;
  const resp = await fetch(url);
  const data = await resp.json();
  const pages = data.query.pages;
  const page = Object.values(pages)[0];
  if (page.imageinfo && page.imageinfo[0]) {
    return page.imageinfo[0].thumburl || page.imageinfo[0].url;
  }
  return null;
}

// ── LOAD COVERS ──
async function loadCovers() {
  const container = document.getElementById('coversContainer');
  container.innerHTML = `<div class="loading-state"><div class="spin-big"></div><div class="loading-text">${lang === 'fr' ? 'Chargement des couvertures…' : 'Loading covers…'}</div></div>`;

  // Try to fetch thumb URLs from Wikimedia API
  const results = [];
  for (const cover of CURATED_COVERS) {
    try {
      const thumb = await fetchWikimediaThumb(cover.file, 400);
      if (thumb) {
        results.push({ ...cover, thumbUrl: thumb });
      }
    } catch(e) {
      // If API fails, skip this cover
    }
  }

  // Also try to search Wikimedia Commons category for more covers
  try {
    const catUrl = `https://commons.wikimedia.org/w/api.php?action=query&list=categorymembers&cmtitle=Category:The_New_Yorker_covers&cmtype=file&cmlimit=30&format=json&origin=*`;
    const catResp = await fetch(catUrl);
    const catData = await catResp.json();
    if (catData.query && catData.query.categorymembers) {
      const members = catData.query.categorymembers;
      // Get thumb URLs for category members not already in our curated list
      const curatedFiles = CURATED_COVERS.map(c => c.file);
      for (const member of members.slice(0, 12)) {
        const fname = member.title.replace('File:', '');
        if (!curatedFiles.includes(fname) && !results.find(r => r.file === fname)) {
          try {
            const thumb = await fetchWikimediaThumb(fname, 400);
            if (thumb) {
              // Parse year from filename if possible
              const yearMatch = fname.match(/(\d{4})/);
              const year = yearMatch ? yearMatch[1] : '';
              results.push({
                file: fname,
                date_fr: year ? `Couverture ${year}` : 'The New Yorker',
                date_en: year ? `Cover ${year}` : 'The New Yorker',
                artist: '',
                desc_fr: 'Couverture libre de droits disponible sur Wikimedia Commons.',
                desc_en: 'Public domain cover available on Wikimedia Commons.',
                thumbUrl: thumb
              });
            }
          } catch(e) {}
        }
      }
    }
  } catch(e) {}

  covers = results;
  renderCovers();
}

function renderCovers() {
  const container = document.getElementById('coversContainer');
  if (covers.length === 0) {
    container.innerHTML = `<div class="error-state">
      <p>${lang === 'fr' ? 'Impossible de charger les couvertures.' : 'Unable to load covers.'}</p>
      <button class="retry-btn" onclick="loadCovers()">${lang === 'fr' ? 'Réessayer' : 'Retry'}</button>
    </div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'covers-grid';

  covers.forEach((cover, i) => {
    const card = document.createElement('div');
    card.className = 'cover-card';
    card.onclick = () => openModal(i);

    const dateLabel = lang === 'fr' ? cover.date_fr : cover.date_en;
    const artistLabel = cover.artist || '';

    card.innerHTML = `
      <div class="cover-img-wrap">
        <div class="loader" id="loader-${i}"></div>
        <img src="${cover.thumbUrl}" alt="${dateLabel}" loading="lazy"
          onload="document.getElementById('loader-${i}').style.display='none'"
          onerror="document.getElementById('loader-${i}').style.display='none'; this.style.display='none'">
      </div>
      <div class="cover-info">
        <div class="cover-date">${dateLabel}</div>
        ${artistLabel ? `<div class="cover-artist">${artistLabel}</div>` : ''}
      </div>`;
    grid.appendChild(card);
  });

  container.innerHTML = '';
  container.appendChild(grid);
}

// ── MODAL ──
function openModal(i) {
  const cover = covers[i];
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalImg').src = cover.thumbUrl;
  document.getElementById('modalTitle').textContent = lang === 'fr' ? cover.date_fr : cover.date_en;
  document.getElementById('modalMeta').textContent = cover.artist || 'The New Yorker';
  document.getElementById('modalDesc').textContent = lang === 'fr' ? cover.desc_fr : cover.desc_en;
  overlay.classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay') || e.target.className === 'modal-close') {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// ── HISTORY ──
const HISTORY = {
  fr: [
    {
      year: '1925',

  content.innerHTML = data.map(era => `
    <div class="era-block">

      <div class="era-title">${era.title}</div>
      <div class="era-text">${era.text}</div>
      ${era.quote ? `<div class="pull-quote">${era.quote}</div>` : ''}

}

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'history') renderHistory();
  if (tab === 'about') renderAbout();
}

// ── LANGUAGE ──
function toggleLang() {
  lang = lang === 'fr' ? 'en' : 'fr';
  applyLang();
}

function applyLang() {
  // Flag & label
  document.getElementById('flagIcon').textContent = lang === 'fr' ? '🇬🇧' : '🇫🇷';
  document.getElementById('langLabel').textContent = lang === 'fr' ? 'EN' : 'FR';
  document.getElementById('headerSubtitle').textContent = lang === 'fr' ? 'Magazine · est. 1925' : 'Magazine · est. 1925';

  // Tabs
  document.querySelectorAll('.tab-label').forEach(el => {
    el.textContent = el.dataset[lang];
  });

  // Section headers
  document.getElementById('coversTitle').textContent = lang === 'fr' ? 'Couvertures emblématiques' : 'Iconic Covers';
  document.getElementById('coversDesc').textContent = lang === 'fr'
    ? 'Couvertures libres de droits issues de Wikimedia Commons (1925–1927)'
    : 'Public domain covers from Wikimedia Commons (1925–1927)';

  // Re-render active panels
  if (covers.length > 0) renderCovers();
  const activeTab = document.querySelector('.tab-panel.active')?.id.replace('panel-', '');
  if (activeTab === 'history') renderHistory();
  if (activeTab === 'about') renderAbout();
}
